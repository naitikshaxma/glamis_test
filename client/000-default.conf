<VirtualHost *:80>
    # The ServerAdmin directive allows the administrator to specify their email address.
    ServerAdmin webmaster@localhost

    # The DocumentRoot directive specifies the directory from which Apache will serve files.
    DocumentRoot /var/www/html

    # This block provides configuration settings for the DocumentRoot directory.
    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride ALl
        Require all granted
    </Directory>

    # The ErrorLog directive specifies the location of the error log file.
    ErrorLog ${APACHE_LOG_DIR}/error.log

    # The CustomLog directive specifies the location and format of the access log file.
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>